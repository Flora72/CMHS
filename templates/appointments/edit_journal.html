{% extends 'base.html' %}
{% block title %}Edit Entry | CMHS{% endblock %}

{% block content %}
<div class="fixed inset-0 flex bg-gray-50 overflow-hidden font-sans">
    {% include 'includes/patient_sidebar.html' %}
    
    <main class="flex-1 overflow-y-auto p-8 mt-16 md:mt-0">
        <div class="max-w-2xl mx-auto">
            <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-200">
                <h2 class="text-2xl font-bold text-chiromo-navy mb-6">Edit Journal Entry</h2>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Mood</label>
                        <select name="mood" class="w-full p-3 border rounded-lg bg-gray-50">
                            <option value="Great" {% if entry.mood_rating == 'Great' %}selected{% endif %}>😊 Great</option>
                            <option value="Okay" {% if entry.mood_rating == 'Okay' %}selected{% endif %}>😐 Okay</option>
                            <option value="Low" {% if entry.mood_rating == 'Low' %}selected{% endif %}>😔 Low</option>
                            <option value="Bad" {% if entry.mood_rating == 'Bad' %}selected{% endif %}>😫 Bad</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Title</label>
                        <input type="text" name="title" value="{{ entry.title }}" class="w-full p-3 border rounded-lg font-bold" required>
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Content</label>
                        <textarea name="content" rows="6" class="w-full p-3 border rounded-lg" required>{{ entry.content }}</textarea>
                    </div>
                    
                    <div class="flex gap-4">
                        <button type="submit" class="flex-1 bg-chiromo-navy text-white font-bold py-3 rounded-lg hover:bg-blue-900 transition">Update Entry</button>
                        <a href="{% url 'journal' %}" class="flex-1 bg-gray-100 text-gray-600 text-center font-bold py-3 rounded-lg hover:bg-gray-200 transition">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
{% endblock %}
