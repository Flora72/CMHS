{% extends "admin/login.html" %}

{% block extrastyle %}
{{ block.super }}
<style>
    body.login-page {
        background: linear-gradient(135deg, #00183E 0%, #003366 100%) !important;
        display: flex !important;
        align-items: center;
        justify-content: center;
        height: 100vh !important;
        margin: 0;
        font-family: 'Source Sans Pro', sans-serif;
    }

    .login-logo { display: none !important; }

    .login-box {
        width: 480px !important;
    }

    .login-box .card {
        border-top: 10px solid #AC8341 !important;
        border-radius: 15px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        padding: 25px;
        background: #ffffff;
    }

    .login-box-msg {
        font-size: 1.6rem !important;
        font-weight: 800 !important;
        color: #00183E !important;
        text-align: center;
        margin-bottom: 5px;
        padding-top: 10px;
    }

    .login-box .card-body::before {
        content: "Admin Dashboard";
        display: block;
        text-align: center;
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 25px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .form-control {
        border-radius: 5px !important;
        height: 45px;
    }

    .input-group-text {
        background-color: #f4f6f9;
        border-radius: 0 5px 5px 0 !important;
    }

    .btn-primary {
        background-color: #AC8341 !important;
        border: none !important;
        height: 50px;
        font-size: 1.1rem !important;
        font-weight: 700;
        text-transform: uppercase;
        margin-top: 15px;
        transition: all 0.3s ease;
    }

    .btn-primary:hover {
        background-color: #947137 !important;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(172, 131, 65, 0.4);
    }
</style>
{% endblock %}
