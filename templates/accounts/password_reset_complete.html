{% extends 'base.html' %}
{% block title %}Password Changed | CMHS{% endblock %}

{% block content %}
<div class="flex justify-center items-center py-12 px-4 text-center">
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border-t-4 border-chiromo-navy">
        
        <div class="w-16 h-16 bg-blue-50 text-chiromo-navy rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>

        <h2 class="text-2xl font-bold text-chiromo-navy mb-2">Password Reset Complete</h2>
        <p class="text-gray-500 text-sm mb-8">
            Your new password has been set successfully. You can now log in to your account with your updated credentials.
        </p>

        <a href="{% url 'login' %}" class="inline-block w-full bg-chiromo-navy hover:bg-blue-900 text-white font-bold py-3 rounded-lg transition duration-300 shadow-md">
            Sign In Now
        </a>
    </div>
</div>
{% endblock %}
