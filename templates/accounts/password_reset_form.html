{% extends 'base.html' %}
{% block title %}Reset Password | CMHS{% endblock %}
{% block content %}
<div class="flex justify-center items-center py-12 px-4">
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border-t-4 border-chiromo-navy text-center">
        <h2 class="text-3xl font-bold text-chiromo-navy mb-4">Forgot Password?</h2>
        <p class="text-gray-500 mb-6 text-sm">Enter your email address below and we'll send you a link to reset your password.</p>
        
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div class="text-left">
                <label for="id_email" class="block text-sm font-medium text-chiromo-navy mb-1">Email Address</label>
                <input type="email" name="email" id="id_email" required 
                       class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-chiromo-gold shadow-sm">
            </div>
            <button type="submit" class="w-full bg-chiromo-navy hover:bg-blue-900 text-white font-bold py-3 rounded-lg transition duration-300">
                Send Reset Link
            </button>
        </form>
    </div>
</div>
{% endblock %}
